
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아기 이름 생성기</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle Dark Mode">다크 모드</button>
        <h1>아기 이름 생성기</h1>
        <p>성별을 선택하고 버튼을 눌러 예쁜 아기 이름을 찾아보세요.</p>
        <div class="gender-selection">
            <input type="radio" id="girl" name="gender" value="girl" checked>
            <label for="girl">여자</label>
            <input type="radio" id="boy" name="gender" value="boy">
            <label for="boy">남자</label>
            <input type="radio" id="any" name="gender" value="any">
            <label for="any">모두</label>
        </div>
        <button id="generate-btn">이름 생성하기</button>
        <div id="name-display">
            <p id="generated-name"></p>
        </div>
        
        <div class="partnership-section">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/xnjgkylq" method="POST" id="partnership-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="성함 또는 기업명" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요." required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
